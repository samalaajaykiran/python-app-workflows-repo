on:

  workflow_dispatch:
  push:
    branches: 
      - main

jobs:
  build:
    uses: samalaajaykiran/reusable-workflow-templates-repo/.github/workflows/docker-build.yml@main
    with:
      dockerfile: Dockerfile
      image-name: pythonchatapp
      tag: v1
      context: .
 
  push:
    needs: build
    uses: samalaajaykiran/reusable-workflow-templates-repo/.github/workflows/docker-push-ARC.yml@main
    with:
      image-name: pythonchatapp
      tag: v1
      acr-login-server: ${{ vars.ACR_LOGIN_SERVER }}   # or hardcode if not secret
    secrets:
      ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
      ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
 
  deploy:
    needs: push
    uses: samalaajaykiran/reusable-workflow-templates-repo/.github/workflows/deploy-app-service.yml@main
    with:
      app-name: python-chat-app-service
      ResourceGroup: ${{ vars.AZURE_RESOURCEGROUP }}   # or keep as secret if you want
      image-name: pythonchatapp
      acr-login-server: ${{ vars.ACR_LOGIN_SERVER }}
      tag: v1

    secrets:

      AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
 
