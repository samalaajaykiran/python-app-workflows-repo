name: Docker Build, Push, and Deploy

on:
  workflow_dispatch:
  push:
    branches: 
      - main
      - master

jobs:
  build:
    uses: samalaajaykiran/reusable-workflow-templates-repo/.github/workflows/docker-build.yml@main  # Correct reference
    with:
      dockerfile: Dockerfile
      image-name: pythonchatapp
      tag: v1
      context: .

  push:
    needs: build
    uses: samalaajaykiran/reusable-workflow-templates-repo/.github/workflows/docker-push-ACR.yml@main  # Corrected path without 'blob/main'
    with:
      image-name: pythonchatapp
      tag: v1
      acr-login-server: ${{ vars.ACR_LOGIN_SERVER }}  # Or hardcode if not secret
    secrets:
      ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
      ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}

  deploy:
    needs: push
    uses: samalaajaykiran/reusable-workflow-templates-repo/.github/workflows/deploy-app-service.yml@main  # Correct reference
    with:
      app-name: python-chat-app-service
      ResourceGroup: ${{ vars.AZURE_RESOURCEGROUP }}  # Or keep as secret if you want
      image-name: pythonchatapp
      acr-login-server: ${{ vars.ACR_LOGIN_SERVER }}
      tag: v1
    secrets:
      AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}